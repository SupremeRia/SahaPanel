<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Çevrimdışısınız · Aytemiz Petrol Yakutiye Şubesi</title>
    <style>
      :root {
        --canvas: #f4f7f9;
        --surface: #ffffff;
        --line: #d8e0e7;
        --ink: #17202a;
        --muted: #5a6978;
        --brand: #147c58;
        --brand-strong: #0f6446;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --canvas: #090e16;
          --surface: #141c29;
          --line: #263244;
          --ink: #e9eef4;
          --muted: #9ca8b8;
          --brand: #22a06b;
          --brand-strong: #147c58;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--canvas);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 32px 28px;
        text-align: center;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }
      .badge {
        display: grid;
        place-items: center;
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: var(--brand);
        color: #ffffff;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        font-weight: 700;
      }
      p {
        margin: 0 auto 24px;
        max-width: 32ch;
        font-size: 15px;
        line-height: 1.55;
        color: var(--muted);
      }
      button {
        appearance: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 22px;
        border: 0;
        border-radius: 10px;
        background: var(--brand);
        color: #ffffff;
        font: inherit;
        font-size: 15px;
        font-weight: 600;
        transition: background-color 0.15s ease;
      }
      button:hover {
        background: var(--brand-strong);
      }
      button:focus-visible {
        outline: 2px solid var(--brand);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge" aria-hidden="true">AP</div>
      <h1>Çevrimdışısınız</h1>
      <p>
        İnternet bağlantınız yok. Bağlantı geldiğinde panel otomatik yeniden
        yüklenecek.
      </p>
      <button type="button" onclick="location.reload()">Yeniden dene</button>
    </main>
  </body>
</html>
